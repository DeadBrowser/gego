<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Shield API</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 20px;
      color: #10b981;
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
      animation: pulse 2s infinite;
    }
    h1 {
      margin: 0 0 8px 0;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    p {
      color: #a1a1aa;
      margin: 0 0 24px 0;
      font-size: 15px;
    }
    .code {
      background: rgba(0, 0, 0, 0.5);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-family: monospace;
      color: #d4d4d8;
      font-size: 13px;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status">
      <div class="dot"></div>
      API is running
    </div>
    <h1>Proxy Shield License Server</h1>
    <p>Authentication node is online and ready for connections.</p>
    <div class="code">
      POST /api/validate<br>
      POST /api/heartbeat<br>
      POST /api/logout
    </div>
  </div>
</body>
</html>
